name: Release

on:
  push:
    branches: [main]

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      common_released: ${{ steps.release.outputs['packages/eslint-config-common--release_created'] }}
      react_released: ${{ steps.release.outputs['packages/eslint-config-react--release_created'] }}
      cli_released: ${{ steps.release.outputs['packages/cli--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter "./packages/*" run build
      - name: Publish @misaon/eslint-config-common
        if: needs.release-please.outputs.common_released == 'true'
        run: pnpm --filter "@misaon/eslint-config-common" publish --no-git-checks --access public
      - name: Publish @misaon/eslint-config-react
        if: needs.release-please.outputs.react_released == 'true'
        run: pnpm --filter "@misaon/eslint-config-react" publish --no-git-checks --access public
      - name: Publish @misaon/quality-gateway
        if: needs.release-please.outputs.cli_released == 'true'
        run: pnpm --filter "@misaon/quality-gateway" publish --no-git-checks --access public
