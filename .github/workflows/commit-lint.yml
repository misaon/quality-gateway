name: Commit Lint

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  # We rebase-merge, so every commit lands on main as-is and feeds the
  # changelog — each one must be a valid Conventional Commit.
  commits:
    name: Lint commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6.2.1
        with:
          configFile: commitlint.config.mjs
