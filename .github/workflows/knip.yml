name: Knip

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  knip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # exports/bin point at dist/*.js — build so Knip resolves entry files.
      - run: pnpm build
      - run: pnpm knip
